name: Calculator CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest test_calculator.py -v

      - name: Simulate deploy step
        run: |
          echo "Deploying calculator app..."
          python calculator.py <<< $'1\n5\n3'
          echo "Deployment successful!"
